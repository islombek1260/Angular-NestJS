<div class="max-w-4xl mx-auto p-6 bg-white shadow-lg rounded-xl mt-10">
  <h2 class="text-2xl font-bold mb-6 text-gray-800">Добавить новый товар</h2>

  <form [formGroup]="productForm" (ngSubmit)="onSubmit()" class="space-y-6">
    <!-- Основные поля -->
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Название</label>
        <input type="text" formControlName="name" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm focus:border-indigo-500 focus:ring-indigo-500 sm:text-sm border p-2">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">Категория</label>
        <input type="text" formControlName="category" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700">Описание</label>
      <textarea formControlName="description" rows="3" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2"></textarea>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700">Цена</label>
        <input type="number" formControlName="price" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700">URL главного фото</label>
        <input type="text" formControlName="baseImage" class="mt-1 block w-full rounded-md border-gray-300 shadow-sm border p-2">
      </div>
    </div>

    <hr class="my-8">

    <!-- Секция Вариантов -->
    <div class="flex items-center justify-between mb-4">
      <h3 class="text-lg font-semibold text-gray-800">Варианты (Цвета и размеры)</h3>
      <button type="button" (click)="addVariant()" class="px-4 py-2 bg-green-600 text-white rounded-md hover:bg-green-700 transition shadow">
        + Добавить вариант
      </button>
    </div>

    <div formArrayName="variants" class="space-y-4">
      @for (variant of variants.controls; track $index; let i = $index) {
        <div [formGroupName]="i" class="p-4 border rounded-lg bg-gray-50 grid grid-cols-2 md:grid-cols-5 gap-3 items-end">
          <div>
            <label class="text-xs text-gray-500">Цвет</label>
            <input type="text" formControlName="color" placeholder="Red" class="block w-full border rounded p-1 text-sm">
          </div>
          <div>
            <label class="text-xs text-gray-500">Размер</label>
            <input type="text" formControlName="size" placeholder="XL" class="block w-full border rounded p-1 text-sm">
          </div>
          <div>
            <label class="text-xs text-gray-500">Сток</label>
            <input type="number" formControlName="stock" class="block w-full border rounded p-1 text-sm">
          </div>
          <div>
            <label class="text-xs text-gray-500">SKU (Артикул)</label>
            <input type="text" formControlName="sku" class="block w-full border rounded p-1 text-sm">
          </div>
          <button type="button" (click)="removeVariant(i)" class="text-red-600 hover:text-red-800 text-sm font-medium pb-2">
            Удалить
          </button>
        </div>
      }
    </div>

    <!-- Кнопка сохранения -->
    <div class="pt-6">
      <button type="submit" [disabled]="productForm.invalid || variants.length === 0" 
        class="w-full py-3 px-4 bg-indigo-600 text-white font-bold rounded-lg hover:bg-indigo-700 disabled:bg-gray-400 transition-colors">
        Опубликовать товар
      </button>
    </div>
  </form>
</div>
