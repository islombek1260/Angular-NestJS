<div class="container mx-auto px-4 py-8">
  <header class="mb-8">
    <h1 class="text-3xl font-bold text-gray-900">Каталог товаров</h1>
    <p class="text-gray-600">Выберите лучшее из нашей коллекции</p>
  </header>
  <aside class="w-full lg:w-1/4">
    <app-product-filter (filterChanged)="onFilterUpdate($event)"></app-product-filter>
  </aside>

  <!-- Сетка товаров -->
  <div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-6">
    <!-- Используем пайп async для подписки на поток данных -->
    @for (product of (products$ | async); track product.id) {
      <app-product-card [product]="product"></app-product-card>
    } @empty {
      <!-- Состояние, если товаров нет или идет загрузка -->
      <div class="col-span-full text-center py-12">
        <p class="text-xl text-gray-500">Товары не найдены...</p>
      </div>
    }
  </div>
</div>
