<div class="bg-white p-6 rounded-xl border border-gray-100 shadow-sm">
  <div class="flex items-center justify-between mb-6">
    <h3 class="text-lg font-bold text-gray-900">Фильтры</h3>
    <button 
      (click)="resetFilters()"
      class="text-sm text-indigo-600 hover:text-indigo-800 font-medium"
    >
      Сбросить
    </button>
  </div>

  <form [formGroup]="filterForm" class="space-y-6">
    <!-- Поиск по названию -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Поиск</label>
      <div class="relative">
        <input 
          type="text" 
          formControlName="search"
          placeholder="Название товара..."
          class="w-full pl-3 pr-3 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500 outline-none transition-all"
        >
      </div>
    </div>

    <!-- Категории -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Категория</label>
      <select 
        formControlName="category"
        class="w-full p-2 border rounded-lg bg-gray-50 focus:ring-2 focus:ring-indigo-500 outline-none"
      >
        <option value="">Все категории</option>
        @for (cat of categories; track cat) {
          <option [value]="cat">{{ cat }}</option>
        }
      </select>
    </div>

    <!-- Ценовой диапазон -->
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Цена (USD)</label>
      <div class="flex items-center space-x-2">
        <input 
          type="number" 
          formControlName="minPrice"
          placeholder="От"
          class="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500"
        >
        <span class="text-gray-400">—</span>
        <input 
          type="number" 
          formControlName="maxPrice"
          placeholder="До"
          class="w-full p-2 border rounded-lg text-sm outline-none focus:ring-2 focus:ring-indigo-500"
        >
      </div>
    </div>
  </form>
</div>
