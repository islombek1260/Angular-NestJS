<div class="flex min-h-full flex-col justify-center px-6 py-12 lg:px-8 bg-white dark:bg-gray-950 transition-colors duration-300">
  <div class="sm:mx-auto sm:w-full sm:max-w-sm">
    <img src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=600" alt="Your Company" class="mx-auto h-10 w-auto" />
    <h2 class="mt-10 text-center text-2xl/9 font-bold tracking-tight text-gray-900 dark:text-white">Sign in to your account</h2>
  </div>

  <div class="mt-10 sm:mx-auto sm:w-full sm:max-w-sm">
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="space-y-6">
      
      <div>
        <label for="email" class="block text-sm/6 font-medium text-gray-900 dark:text-gray-300">Email address</label>
        <div class="mt-2">
          <input 
            id="email" 
            formControlName="email"
            type="email" 
            autocomplete="email" 
            [class.outline-red-500]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched"
            class="block w-full rounded-md bg-white dark:bg-gray-900 px-3 py-1.5 text-base text-gray-900 dark:text-white outline-1 -outline-offset-1 outline-gray-300 dark:outline-gray-700 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6 transition-colors" 
          />
        </div>
      </div>

      <div>
        <div class="flex items-center justify-between">
          <label for="password" class="block text-sm/6 font-medium text-gray-900 dark:text-gray-300">Password</label>
          <div class="text-sm">
            <a routerLink="/auth/forgot-password" class="font-semibold text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">Forgot password?</a>
          </div>
        </div>
        <div class="mt-2">
          <input 
            id="password" 
            formControlName="password"
            type="password" 
            autocomplete="current-password" 
            [class.outline-red-500]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched"
            class="block w-full rounded-md bg-white dark:bg-gray-900 px-3 py-1.5 text-base text-gray-900 dark:text-white outline-1 -outline-offset-1 outline-gray-300 dark:outline-gray-700 placeholder:text-gray-400 focus:outline-2 focus:-outline-offset-2 focus:outline-indigo-600 sm:text-sm/6 transition-colors" 
          />
        </div>
      </div>

      <div>
        <button type="submit" [disabled]="loginForm.invalid" 
        class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-xs hover:bg-indigo-500 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600 disabled:opacity-50 disabled:cursor-not-allowed transition-all">
          Sign in
        </button>
      </div>
    </form> 

    <p class="mt-10 text-center text-sm/6 text-gray-500 dark:text-gray-400">
      If you don't have an account?
      <a routerLink="/auth/register" class="font-semibold text-indigo-600 hover:text-indigo-500 dark:text-indigo-400">Registration</a>
    </p>
  </div>
</div>
