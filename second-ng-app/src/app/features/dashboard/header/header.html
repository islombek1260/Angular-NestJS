<div class="bg-white dark:text-white dark:bg-gray-900">
  <header class="absolute inset-x-0 top-0 z-50">
    <nav aria-label="Global" class="flex items-center justify-between p-6 lg:px-8">
      <div class="flex lg:flex-1">
        <a href="#" class="-m-1.5 p-1.5">
          <img src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=600" class="h-8 w-auto" alt="" />
        </a>
      </div>

      <!-- Кнопка мобильного меню -->
      <div class="flex lg:hidden">
        <button type="button" (click)="isMobileMenuOpen = true" class="-m-2.5 inline-flex items-center justify-center rounded-md p-2.5 text-gray-700 dark:text-gray-300">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="size-6">
            <path d="M3.75 6.75h16.5M3.75 12h16.5m-16.5 5.25h16.5" stroke-linecap="round" stroke-linejoin="round" />
          </svg>
        </button>
      </div>

      <!-- Основная навигация -->
<div class="hidden lg:flex lg:gap-x-12">
  <!-- Home -->
  <a routerLink="/" 
     routerLinkActive="text-indigo-600 dark:text-indigo-400" 
     [routerLinkActiveOptions]="{exact: true}"
     class="relative text-sm/6 font-semibold text-gray-900 dark:text-white transition-colors hover:text-indigo-600 dark:hover:text-indigo-400 group">
    Home
    <!-- Линия подчеркивания для активной ссылки -->
    <span routerLinkActive="scale-x-100" 
          [routerLinkActiveOptions]="{exact: true}"
          class="absolute -bottom-1 left-0 w-full h-0.5 bg-indigo-600 dark:bg-indigo-400 origin-left scale-x-0 transition-transform duration-300">
    </span>
  </a>

  <!-- Products -->
  <a routerLink="/products" 
     routerLinkActive="text-indigo-600 dark:text-indigo-400" 
     class="relative text-sm/6 font-semibold text-gray-900 dark:text-white transition-colors hover:text-indigo-600 dark:hover:text-indigo-400">
    Product
    <span routerLinkActive="scale-x-100" 
          class="absolute -bottom-1 left-0 w-full h-0.5 bg-indigo-600 dark:bg-indigo-400 origin-left scale-x-0 transition-transform duration-300">
    </span>
  </a>

  <!-- Features -->
  <a routerLink="/features" 
     routerLinkActive="text-indigo-600 dark:text-indigo-400" 
     class="relative text-sm/6 font-semibold text-gray-900 dark:text-white transition-colors hover:text-indigo-600 dark:hover:text-indigo-400">
    Features
    <span routerLinkActive="scale-x-100" 
          class="absolute -bottom-1 left-0 w-full h-0.5 bg-indigo-600 dark:bg-indigo-400 origin-left scale-x-0 transition-transform duration-300">
    </span>
  </a>

  <!-- Marketplace -->
  <a routerLink="/marketplace" 
     routerLinkActive="text-indigo-600 dark:text-indigo-400" 
     class="relative text-sm/6 font-semibold text-gray-900 dark:text-white transition-colors hover:text-indigo-600 dark:hover:text-indigo-400">
    Marketplace
    <span routerLinkActive="scale-x-100" 
          class="absolute -bottom-1 left-0 w-full h-0.5 bg-indigo-600 dark:bg-indigo-400 origin-left scale-x-0 transition-transform duration-300">
    </span>
  </a>

  <!-- Company -->
  <a routerLink="/company" 
     routerLinkActive="text-indigo-600 dark:text-indigo-400" 
     class="relative text-sm/6 font-semibold text-gray-900 dark:text-white transition-colors hover:text-indigo-600 dark:hover:text-indigo-400">
    Company
    <span routerLinkActive="scale-x-100" 
          class="absolute -bottom-1 left-0 w-full h-0.5 bg-indigo-600 dark:bg-indigo-400 origin-left scale-x-0 transition-transform duration-300">
    </span>
  </a>
</div>

      <div class="hidden lg:flex lg:flex-1 lg:justify-end gap-x-4 items-center">
        <!-- Переключатель темы -->
        <button (click)="themeService.toggleTheme()" class="relative inline-flex h-8 w-14 items-center rounded-full transition-colors duration-300 focus:outline-none shadow-inner" [ngClass]="themeService.isDarkMode() ? 'bg-indigo-600' : 'bg-gray-300'">
          <span class="sr-only">Change theme</span>
          <span class="inline-block size-6 p-1 transform rounded-full bg-white shadow-md transition-transform duration-300 ease-in-out flex items-center justify-center" [ngClass]="themeService.isDarkMode() ? 'translate-x-7' : 'translate-x-1'">
            <svg *ngIf="themeService.isDarkMode()" class="size-4 text-indigo-600" fill="currentColor" viewBox="0 0 20 20">
              <path d="M17.293 13.293A8 8 0 016.707 2.707a8.001 8.001 0 1010.586 10.586z" />
            </svg>
            <svg *ngIf="!themeService.isDarkMode()" class="size-4 text-orange-500" fill="currentColor" viewBox="0 0 20 20">
              <path fill-rule="evenodd" d="M10 2a1 1 0 011 1v1a1 1 0 11-2 0V3a1 1 0 011-1zm4 8a4 4 0 11-8 0 4 4 0 018 0zm-.464 4.95l.707.707a1 1 0 001.414-1.414l-.707-.707a1 1 0 00-1.414 1.414zm2.12-10.607a1 1 0 010 1.414l-.706.707a1 1 0 11-1.414-1.414l.707-.707a1 1 0 011.414 0zM17 11a1 1 0 100-2h-1a1 1 0 100 2h1zm-7 4a1 1 0 011 1v1a1 1 0 11-2 0v-1a1 1 0 011-1zM5.05 6.464A1 1 0 106.465 5.05l-.708-.707a1 1 0 00-1.414 1.414l.707.707zm1.414 8.486l-.707.707a1 1 0 01-1.414-1.414l.707-.707a1 1 0 011.414 1.414zM4 11a1 1 0 100-2H3a1 1 0 000 2h1z" clip-rule="evenodd" />
            </svg>
          </span>
        </button>

        <!-- Секция Авторизации / Профиля -->
        <ng-container *ngIf="authService.isLoggedIn(); else loginBtn">
          <div class="relative">
            <button (click)="toggleProfileMenu(); $event.stopPropagation()" type="button" class="flex items-center gap-x-3 focus:outline-none">
              <!-- ИСПРАВЛЕНО: используем avatarUrl вместо userAvatar -->
              <img [src]="avatarUrl" class="h-8 w-8 rounded-full object-cover ring-2 ring-gray-100" />
              <span class="text-sm font-semibold text-gray-900 dark:text-white">
                {{ userNameDisplay }}
              </span>
            </button>

            <!-- Выпадающее меню профиля -->
            <div *ngIf="isProfileMenuOpen" class="absolute right-0 z-50 mt-2 w-48 origin-top-right rounded-md bg-white py-1 shadow-lg ring-1 ring-black ring-opacity-5 dark:bg-gray-800">
              <a routerLink="/profil" class="flex w-full px-4 py-2 text-sm text-gray-700 hover:bg-gray-100 items-center gap-2 dark:text-gray-300 dark:hover:bg-gray-700">
                Profil
              </a>
              <button (click)="onLogout()" class="block w-full px-4 py-2 text-left text-sm text-red-600 hover:bg-gray-100 dark:hover:bg-gray-700">
                Logout
              </button>
            </div>
          </div>
        </ng-container>

        <ng-template #loginBtn>
          <a routerLink="/auth/login" class="text-sm/6 px-2 font-semibold text-gray-900 dark:text-gray-300">Log in &rarr;</a>
        </ng-template>
      </div>
    </nav>

    <!-- Мобильное меню -->
    <div *ngIf="isMobileMenuOpen" class="lg:hidden fixed inset-0 z-50">
      <div class="fixed inset-0 bg-black/20 backdrop-blur-sm" (click)="isMobileMenuOpen = false"></div>
      <div class="fixed inset-y-0 right-0 w-full overflow-y-auto bg-white p-6 sm:max-w-sm sm:ring-1 sm:ring-gray-900/10 dark:bg-gray-800">
        <div class="flex items-center justify-between">
          <img src="https://tailwindcss.com/plus-assets/img/logos/mark.svg?color=indigo&shade=600" class="h-8 w-auto" alt="" />
          <button (click)="isMobileMenuOpen = false" class="p-2.5 text-gray-700 dark:text-gray-300 rounded-md">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" class="size-6">
              <path d="M6 18 18 6M6 6l12 12" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </button>
        </div>

        <div class="mt-6 flow-root">
          <div class="space-y-2 py-6">
  <!-- Ссылка Home -->
  <a routerLink="/" 
     routerLinkActive="bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400" 
     [routerLinkActiveOptions]="{exact: true}"
     class="block px-3 py-2 text-base font-semibold text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors">
     Home
  </a>

  <!-- Ссылка Products -->
  <a routerLink="/products" 
     routerLinkActive="bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400" 
     class="block px-3 py-2 text-base font-semibold text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors">
     Product
  </a>

  <!-- Ссылка Features -->
  <a routerLink="/features" 
     routerLinkActive="bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400" 
     class="block px-3 py-2 text-base font-semibold text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors">
     Features
  </a>

  <!-- Ссылка Marketplace -->
  <a routerLink="/marketplace" 
     routerLinkActive="bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400" 
     class="block px-3 py-2 text-base font-semibold text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors">
     Marketplace
  </a>

  <!-- Ссылка Company -->
  <a routerLink="/company" 
     routerLinkActive="bg-indigo-50 text-indigo-600 dark:bg-indigo-900/20 dark:text-indigo-400" 
     class="block px-3 py-2 text-base font-semibold text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700 rounded-lg transition-colors">
     Company
  </a>
</div>

          <div class="py-6 border-t border-gray-100 dark:border-gray-700">
            <ng-container *ngIf="authService.isLoggedIn(); else mobileLoginBtn">
              <div class="flex items-center gap-x-3 mb-4">
                <!-- ИСПРАВЛЕНО: используем avatarUrl в мобильном меню -->
                <img [src]="avatarUrl" class="h-10 w-10 rounded-full object-cover" />
                <span class="font-semibold text-gray-900 dark:text-white">
                  {{ userNameDisplay }}
                </span>
              </div>
              <a routerLink="/profil" class="block w-full text-left px-3 py-2 text-base font-semibold text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700">
                Profil
              </a>
              <button (click)="onLogout()" class="block w-full text-left px-3 py-2 text-base font-semibold text-red-600 dark:text-red-500 hover:bg-gray-50 dark:hover:bg-gray-700">
                Logout
              </button>
            </ng-container>

            <ng-template #mobileLoginBtn>
              <a routerLink="/auth/login" class="block px-3 py-2 text-base font-semibold text-gray-900 dark:text-white hover:bg-gray-50 dark:hover:bg-gray-700">Log in</a>
            </ng-template>
          </div>
        </div>
      </div>
    </div>
  </header>
</div>
